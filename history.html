<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UnmapJS - History</title>
  <link rel="stylesheet" href="history.css" />
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M8 3L4 12L8 21" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 3L20 12L16 21" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 7V17" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="2" fill="#a78bfa"/>
        </svg>
        <span class="logo-text">UnmapJS <span class="sub">/ History</span></span>
      </div>
      <div class="header-actions">
        <span id="totalBadge" class="total-badge">0 sites</span>
        <button id="clearBtn" class="btn-clear">Clear History</button>
      </div>
    </header>

    <!-- Filter bar -->
    <div class="filterbar">
      <input id="searchInput" class="search-input" type="text" placeholder="Search site..." />
      <span class="filter-info" id="filterInfo"></span>
    </div>

    <!-- List -->
    <div id="listContainer" class="list-container">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">&#128269;</div>
        <div class="empty-title">No records yet</div>
        <div class="empty-desc">While browsing sites, UnmapJS automatically scans for sourcemaps in the background.<br>Sites found will be listed here.</div>
      </div>
    </div>

  </div>

  <script src="history.js"></script>
</body>
</html>
